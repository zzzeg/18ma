name: Ping

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger info
        run: |
          echo "GitHub Actions is running."
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
