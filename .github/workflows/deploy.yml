name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  API_IMAGE: ghcr.io/zzzeg/18ma-api
  FRONTEND_IMAGE: ghcr.io/zzzeg/18ma-frontend
  IMAGE_PLATFORM: linux/arm64

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./node_server
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trigger Jenkins deploy
        env:
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
          JENKINS_WEBHOOK_URL: ${{ secrets.JENKINS_WEBHOOK_URL }}
          JENKINS_WEBHOOK_TOKEN: ${{ secrets.JENKINS_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$JENKINS_USER" ]; then
            echo "Missing GitHub secret: JENKINS_USER"
            exit 1
          fi

          if [ -z "$JENKINS_API_TOKEN" ]; then
            echo "Missing GitHub secret: JENKINS_API_TOKEN"
            exit 1
          fi

          if [ -z "$JENKINS_WEBHOOK_URL" ]; then
            echo "Missing GitHub secret: JENKINS_WEBHOOK_URL"
            exit 1
          fi

          if [ -z "$JENKINS_WEBHOOK_TOKEN" ]; then
            echo "Missing GitHub secret: JENKINS_WEBHOOK_TOKEN"
            exit 1
          fi

          curl --fail --show-error --silent \
            --user "$JENKINS_USER:$JENKINS_API_TOKEN" \
            -X POST \
            "$JENKINS_WEBHOOK_URL?token=$JENKINS_WEBHOOK_TOKEN"
