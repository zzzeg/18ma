name: 18ma

services:
  mysql:
    image: mysql:8.4
    container_name: 18ma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-18ma_app}
      MYSQL_USER: ${MYSQL_USER:-18ma}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./node_server
    container_name: 18ma-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      DB_DIALECT: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-18ma_app}
      DB_USER: ${MYSQL_USER:-18ma}
      DB_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - api_uploads:/app/uploads
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    container_name: 18ma-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  mysql_data:
  api_uploads:
